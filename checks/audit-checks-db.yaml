# Database Audit Checks
# For projects using SQLite or PostgreSQL as their data store.
# Generated by setup.py when SQLite/PostgreSQL is selected.
#
# Run standalone:
#   python3 hooks/audit.py --checks checks/audit-checks-db.yaml --verbose
#
# Or combine with generic checks:
#   python3 hooks/audit.py --checks checks/audit-checks.yaml --merge checks/audit-checks-db.yaml
#
# Set AGENT_DB_PATH to your database path (default: project.db)

checks:
  - name: db-integrity
    description: "Database passes integrity check (no corruption)"
    command: "sqlite3 ${AGENT_DB_PATH:-project.db} 'PRAGMA integrity_check' 2>&1"
    validator: "contains:ok"
    phase: integrity
    critical: true

  - name: schema-tables-exist
    description: "All expected schema tables exist in the database"
    command: "sqlite3 ${AGENT_DB_PATH:-project.db} \"SELECT count(*) FROM sqlite_master WHERE type='table' AND name NOT LIKE 'sqlite_%'\" 2>&1"
    validator: not_empty
    phase: integrity
    critical: true

  - name: no-empty-critical-tables
    description: "Critical tables (rules, checks) have at least one row"
    command: "sqlite3 ${AGENT_DB_PATH:-project.db} \"SELECT name FROM sqlite_master WHERE type='table' AND name NOT LIKE 'sqlite_%'\" 2>/dev/null | while read t; do c=$(sqlite3 ${AGENT_DB_PATH:-project.db} \"SELECT count(*) FROM $t\" 2>/dev/null); if [ \"$c\" = \"0\" ]; then echo \"$t\"; fi; done | wc -l | tr -d ' '"
    validator: "equals:0"
    phase: integrity
    critical: false

  - name: no-orphaned-records
    description: "No foreign key violations in the database"
    command: "sqlite3 ${AGENT_DB_PATH:-project.db} 'PRAGMA foreign_key_check' 2>&1 | wc -l | tr -d ' '"
    validator: "equals:0"
    phase: integrity
    critical: true

  - name: db-size-reasonable
    description: "Database file is under 100MB (prevents undetected bloat)"
    command: "python3 -c \"import os; size=os.path.getsize(os.environ.get('AGENT_DB_PATH','project.db')); print('ok' if size < 104857600 else f'large:{size//1048576}MB')\" 2>&1"
    validator: "contains:ok"
    phase: quality
    critical: false
