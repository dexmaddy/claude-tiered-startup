title: Tiered Startup Architecture
description: A hook-based system for reliable AI agent sessions
baseurl: "/claude-tiered-startup"
url: "https://dexmaddy.github.io"

theme: just-the-docs

nav_order_default: 0
nav_enabled: true

exclude:
  - Gemfile
  - Gemfile.lock
  - hooks/
  - tests/
  - examples/
  - .github/
  - LICENSE

defaults:
  - scope:
      path: "course"
    values:
      parent: "Course"
