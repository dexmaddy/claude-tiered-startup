# Tiered Startup Configuration
# Copy this to your project as startup-config.yaml and customize.

# --- Tier Definitions ---
# Tier 1: Always loaded at session start (keep total under ~1500 lines)
# Tier 2: Loaded on-demand when trigger keywords appear in tool calls
tiers:
  tier1:
    - name: core-rules
      source: rules/core-rules.md          # static file — copied as-is
      description: "Core behavioral rules"

    - name: project-context
      source: scripts/gen_context.sh        # dynamic — script stdout becomes the file
      type: generated
      description: "Project state and active work"

    - name: infra-report
      type: checks                          # special — built from check results below
      description: "Infrastructure health report"

  tier2:
    - name: api-reference
      triggers: ["api", "endpoint", "REST", "swagger"]
      source: rules/api-rules.md
      description: "API design and integration rules"

    - name: testing-guide
      triggers: ["test", "pytest", "jest", "spec"]
      source: rules/testing-rules.md
      description: "Testing standards and patterns"

    - name: deployment
      triggers: ["deploy", "CI", "pipeline", "release"]
      source: rules/deployment-rules.md
      description: "Deployment and CI/CD procedures"

# --- Infrastructure Checks ---
# Run during SessionStart. Results go into the infra-report tier1 file.
# Each check has a command and a validator (how to interpret stdout).
checks:
  - name: git-clean
    command: "git status --porcelain"
    validator: empty_output                 # pass if stdout is empty
    fail_message: "Uncommitted changes detected"

  - name: db-health
    command: "sqlite3 project.db 'PRAGMA integrity_check'"  # adapt for your DB (Postgres, MySQL, etc.)
    validator: "contains:ok"                # pass if stdout contains "ok"
    fail_message: "Database integrity check failed"

  - name: tests-pass
    command: "npm test --silent 2>&1 | tail -1"
    validator: "contains:passing"
    fail_message: "Tests are failing"
    optional: true                          # won't block startup

  - name: no-stale-branches
    command: "git branch --merged main | grep -v main | wc -l | tr -d ' '"
    validator: "equals:0"
    fail_message: "Merged branches need cleanup"
    optional: true

# --- Gate Configuration ---
gates:
  block_until_tier1: true                   # PreToolUse blocks non-Read tools until tier1 read
  tier2_keyword_scan: true                  # scan tool inputs for tier2 trigger keywords
  keyword_scan_fields:                      # which JSON fields to scan (limit to avoid false positives)
    - command                               # Bash command text
    - file_path                             # Read/Write file path
    - prompt                                # Agent prompt
    - description                           # Agent description
  keyword_scan_max_chars: 120               # only scan first N chars of each field
  prompt_health_warnings: [40, 60, 80]      # warn at these prompt counts

# --- Stop Hook ---
stop:
  require_clean_repos: true                 # block exit until git repos are clean
  require_transcript: false                 # block exit until transcript saved
  require_audit_pass: false                 # run audit checks before exit (Level 4)
  # audit_checks_path: checks/audit-checks.yaml  # custom path (default: auto-detected)
  require_session_summary: false            # DB mode: require session summary before exit
  max_retries: 8                            # how many times to retry before force-exit
  shutdown_steps:                           # custom checks before exit (same validators as startup)
    # - name: lint-clean
    #   command: "npm run lint 2>&1 | tail -1"
    #   validator: "contains:no errors"
    #   fail_message: "Linter has errors"

# --- Rule Zero (Level 4) ---
# After every Write/Edit, scan the edited file for keyword overlap with
# consolidated files. Warns if content appears scattered.
rule_zero:
  consolidated_files:
    "MEMORY.md": ["memory", "pointer", "reference", "project state"]
    "*.md": ["feedback", "project", "reference", "architecture"]

# --- Cross-Check (Level 3) ---
# Compare expected state against live commands after Tier 1 loads.
# Auto-heal safe items, log remaining drift. Runs once per session.
cross_check:
  expected_counts:
    rule_count:
      command: "find rules/ -name '*.md' | wc -l | tr -d ' '"
      expected: 1
      auto_heal: false
    # Add your own checks:
    # test_count:
    #   command: "find tests/ -name 'test_*.py' | wc -l | tr -d ' '"
    #   expected: 10
    #   auto_heal: false
