site_name: Agentic AI Tiered Startup Architecture
site_description: A hook-based system for reliable AI agent sessions
site_url: https://dexmaddy.github.io/agentic-ai-tiered-startup/

theme:
  name: material
  palette:
    - scheme: default
      primary: custom
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.top
    - navigation.path
    - navigation.indexes
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  logo: assets/logo.svg
  favicon: assets/favicon.png
  icon:
    repo: fontawesome/brands/github
    admonition:
      note: fontawesome/solid/note-sticky
      tip: fontawesome/solid/lightbulb
      warning: fontawesome/solid/triangle-exclamation

repo_url: https://github.com/dexmaddy/agentic-ai-tiered-startup
repo_name: dexmaddy/agentic-ai-tiered-startup

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search

extra_css:
  - stylesheets/extra.css

nav:
  - What You'll Achieve:
    - index.md
    - Overview: overview/index.md
    - Getting Started: reference/setup-wizard.md
    - Mini Course: course/index.md
    - Reference: reference/index.md
  - Overview:
    - overview/index.md
    - What It Does For You: overview/capabilities.md
    - The Problem: overview/the-problem.md
    - Architecture: overview/architecture.md
    - Implementation Levels: overview/levels.md
    - Data Store & Platforms: overview/data-and-platforms.md
    - Lessons Learned: overview/lessons-learned.md
    - Slide Deck: slides.md
  - Getting Started:
    - Setup Wizard: reference/setup-wizard.md
    - Bootstrapping Guide: reference/bootstrapping-guide.md
  - Course:
    - course/index.md
    - Foundations:
      - "Module 1: The Problem": course/module-1-the-problem.md
      - "Module 2: Architecture": course/module-2-architecture.md
    - Hands-On:
      - "Module 3: First Hook": course/module-3-first-hook.md
      - "Module 4: Adding Gates": course/module-4-gates.md
      - "Module 5: Advanced": course/module-5-advanced.md
    - Deep Dives:
      - "Module 6: Anti-Hallucination": course/module-6-anti-hallucination.md
      - "Module 7: Feedback Loop": course/module-7-feedback-loop.md
      - "Module 8: Capstone": course/module-8-capstone.md
  - Reference:
    - reference/index.md
    - Rules & Frameworks:
      - Anti-Hallucination Rules: rules/anti-hallucination-rules.md
      - Rule Evolution: reference/rule-evolution-template.md
      - Rule Zero: reference/rule-zero.md
    - Patterns:
      - Self-Healing Loop: reference/self-healing-loop.md
      - Self-Verification: reference/self-verification.md
      - Audit Runner: reference/audit-runner.md
      - Session Continuity: reference/session-continuity.md
    - Guides:
      - Data Store Mapping: reference/data-store-mapping.md
